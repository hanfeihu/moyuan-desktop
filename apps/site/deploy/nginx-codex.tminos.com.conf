server {
    listen 18080;
    listen [::]:18080;
    server_name codex.tminos.com;

    root /opt/moyuan-site;
    index index.html;

    charset utf-8;
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /images/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location /media/worldcup-materials/ {
        proxy_pass http://127.0.0.1:10900/worldcup-materials/;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_read_timeout 120s;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /downloads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Disposition "attachment" always;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /opt/moyuan-site/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /admin-api/ {
        proxy_pass http://127.0.0.1:14000/api/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /admin-health {
        proxy_pass http://127.0.0.1:14000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
