services:
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build -w @eaw/api && npm run start -w @eaw/api"
    volumes:
      - .:/app
    environment:
      API_PORT: 4000
      CODEX_RUNTIME_URL: http://codex-runtime:4100
      AI_BASE_URL: ${AI_BASE_URL:-https://ai.blector.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5-codex}
    ports:
      - "14000:4000"
    restart: unless-stopped

  codex-runtime:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build -w @eaw/codex-runtime && npm run start -w @eaw/codex-runtime"
    volumes:
      - .:/app
    environment:
      CODEX_RUNTIME_PORT: 4100
      AI_BASE_URL: ${AI_BASE_URL:-https://ai.blector.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5-codex}
    ports:
      - "14100:4100"
    restart: unless-stopped
